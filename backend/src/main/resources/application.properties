spring.application.name=restaurant-backend

# ========== DATABASE CONFIGURATION ==========
# Default to H2 so the app starts without an external database server.
# Switch to application-mysql.properties if you want MySQL-backed persistence.
spring.datasource.url=jdbc:h2:mem:restaurantdb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ========== JPA/Hibernate Configuration ==========
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Enable detailed SQL and parameter logging for debugging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ========== Database Initialization ==========
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# ========== Server Configuration ==========
server.port=8080
server.servlet.context-path=/

# Enable request logging for backend diagnostics
logging.level.org.springframework.web=DEBUG