# MySQL Configuration for Restaurant Backend
# Copy these settings to application.properties when switching from H2 to MySQL

# ===== CURRENT CONFIGURATION (H2 - In-Memory Database) =====
spring.datasource.url=jdbc:h2:mem:fooddb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===== MySQL CONFIGURATION (Use these settings to switch to MySQL) =====
# spring.datasource.url=jdbc:mysql://localhost:3306/fooddb?useSSL=false&serverTimezone=UTC
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=your_password_here

# ===== Hibernate Configuration =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== Database Platform (Choose based on database) =====
# For H2:
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# For MySQL:
# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ===== Server Port =====
server.port=8080

# ===== MySQL Setup Steps =====
# 1. Install MySQL Server
# 2. Create database: CREATE DATABASE fooddb;
# 3. Create user: CREATE USER 'root'@'localhost' IDENTIFIED BY 'password';
# 4. Grant privileges: GRANT ALL PRIVILEGES ON fooddb.* TO 'root'@'localhost';
# 5. FLUSH PRIVILEGES;
# 6. Add MySQL connector to pom.xml:
#    <dependency>
#        <groupId>mysql</groupId>
#        <artifactId>mysql-connector-java</artifactId>
#        <version>8.0.33</version>
#    </dependency>
# 7. Update application.properties with MySQL settings above
# 8. Restart Spring Boot application
